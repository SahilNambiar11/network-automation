apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  labels:
    app.kubernetes.io/name: worker
    app.kubernetes.io/part-of: distributed-go-network-controller
spec:
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: worker
        app.kubernetes.io/part-of: distributed-go-network-controller
    spec:
      terminationGracePeriodSeconds: 45
      containers:
        - name: worker
          image: distributed-go-network-controller/worker:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: WORKER_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: WORKER_CONCURRENCY
              valueFrom:
                configMapKeyRef:
                  name: network-controller-config
                  key: WORKER_CONCURRENCY
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: network-controller-secrets
                  key: DATABASE_URL
          readinessProbe:
            exec:
              command: ["/app/worker", "-healthcheck"]
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            exec:
              command: ["/app/worker", "-healthcheck"]
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 18
          livenessProbe:
            exec:
              command: ["/bin/sh", "-c", "test -x /app/worker"]
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
